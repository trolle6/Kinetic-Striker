name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build mod
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Find release JAR
        id: jar
        run: echo "path=$(ls build/libs/tnt-rocket-leauge-*.jar | grep -v sources | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
